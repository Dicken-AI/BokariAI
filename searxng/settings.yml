use_default_settings: true

general:
  instance_name: 'searxng'

search:
  autocomplete: 'google'
  formats:
    - html
    - json

server:
  secret_key: 'a2fb23f1b02e6ee83875b09826990de0f6bd908b6638e8c10277d415f6ab852b' # Is overwritten by ${SEARXNG_SECRET}

outgoing:
  request_timeout: 4.0
  max_request_timeout: 8.0

engines:
  - name: wolframalpha
    disabled: false
  # These engines block or time out from a datacenter IP and slow every query
  # down to their 6s timeout — disable so SearXNG returns the fast engines
  # (Google, Bing, …) in ~1-2s instead.
  - name: duckduckgo
    disabled: true
  - name: duckduckgo news
    disabled: true
  - name: wikidata
    disabled: true
  - name: brave
    disabled: true
